<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Migrañas</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #4a4a8c;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            margin-top: 20px;
        }
        button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            margin-bottom: 30px;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #ff5252;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            border-top: 2px solid #f4f4f9;
            padding-top: 20px;
        }
        .stat-box {
            flex: 1;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #4a4a8c;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #alert-msg {
            color: #28a745;
            font-size: 0.9rem;
            min-height: 20px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mi Registro</h1>
        <p style="color: #666; margin-bottom: 30px;">Toca el botón cuando sientas dolor para llevar un registro automático.</p>
        
        <div id="alert-msg"></div>

        <button id="log-btn">Registrar Migraña Ahora</button>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-week">0</div>
                <div class="stat-label">Media / Sem</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-month">0</div>
                <div class="stat-label">Media / Mes</div>
            </div>
        </div>
        
        <button id="reset-btn" style="background-color: transparent; color: #aaa; box-shadow: none; font-size: 0.8rem; margin-top: 20px; padding: 10px;">Borrar todos los datos</button>
    </div>

    <script>
        const btn = document.getElementById('log-btn');
        const resetBtn = document.getElementById('reset-btn');
        const alertMsg = document.getElementById('alert-msg');
        
        const statTotal = document.getElementById('stat-total');
        const statWeek = document.getElementById('stat-week');
        const statMonth = document.getElementById('stat-month');

        // Cargar datos del almacenamiento del navegador
        function getRecords() {
            const data = localStorage.getItem('migraine_records');
            return data ? JSON.parse(data) : [];
        }

        // Guardar datos
        function saveRecords(records) {
            localStorage.setItem('migraine_records', JSON.stringify(records));
        }

        // Calcular y mostrar estadísticas
        function updateStats() {
            const records = getRecords();
            const total = records.length;
            statTotal.textContent = total;

            if (total === 0) {
                statWeek.textContent = "0";
                statMonth.textContent = "0";
                return;
            }

            // Fechas del primer registro y del momento actual
            const firstDate = new Date(records[0]);
            const now = new Date();
            
            // Diferencia en días (aseguramos que al menos sea 1 para no dividir por cero)
            const diffTime = Math.abs(now - firstDate);
            const diffDays = Math.max(Math.ceil(diffTime / (1000 * 60 * 60 * 24)), 1);

            // Calculamos las semanas y meses que han pasado (mínimo 1 para que la media al empezar no esté inflada)
            const weeksPassed = Math.max(diffDays / 7, 1);
            const monthsPassed = Math.max(diffDays / 30.44, 1); // 30.44 es la media de días por mes

            // Calculamos las medias y redondeamos a 1 decimal
            const avgWeek = (total / weeksPassed).toFixed(1);
            const avgMonth = (total / monthsPassed).toFixed(1);

            statWeek.textContent = avgWeek;
            statMonth.textContent = avgMonth;
        }

        // Evento al pulsar el botón principal
        btn.addEventListener('click', () => {
            const records = getRecords();
            records.push(new Date().toISOString());
            saveRecords(records);
            updateStats();
            
            // Mostrar mensaje de confirmación
            alertMsg.textContent = "Registrado. ¡Espero que te mejores pronto! 🫂";
            setTimeout(() => { alertMsg.textContent = ""; }, 3000);
        });

        // Evento para borrar datos
        resetBtn.addEventListener('click', () => {
            if(confirm("¿Estás seguro de que quieres borrar todo tu historial? Esto no se puede deshacer.")) {
                localStorage.removeItem('migraine_records');
                updateStats();
            }
        });

        // Cargar las estadísticas al abrir la página
        updateStats();
    </script>
</body>
</html>
